name: liturgia_plus
description: >
  Liturgia+ — aplikacja wspierająca ministrantów, lektorów, ceremoniarzy
  i wszystkich wiernych w poznawaniu liturgii Kościoła katolickiego.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # --- State management ---
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # --- Routing ---
  go_router: ^14.2.0

  # --- UI / Typografia ---
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # --- Lokalne dane (na przyszłość: profil, ulubione) ---
  shared_preferences: ^2.2.3

  # --- Wybór zdjęcia profilowego ---
  image_picker: ^1.1.2

  # --- Modele danych (na przyszłość, immutable models) ---
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # --- Generowanie kodu (Riverpod, Freezed, JSON) ---
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
